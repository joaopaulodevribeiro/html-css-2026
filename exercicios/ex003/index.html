<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Imagens</title>
</head>
<body>
    <h1>Testando carga e Imagens</h1>
    <p>Abaixo você vai ver uma imagem que está na mesma pasta.</p>
    <img src="logo-html.png" alt="Logo HTML5"> <!--Imagem dentro da mesma pasta-->
    <p>Podemos também carregar imagens que estão em sub-pastas.</p>
    <img src="imagens/logo-css.png" alt="Logo CSS3"> <!--Imagem dentro de outra pasta-->
    <p>Também podemos carregar imagens externas.</p>
    <img src="https://www.studytonight.com/css/resource.v3/icons/subject/logo-javascript.svg" alt="Logo JavaScript"> <!--URL--> <!--Imagem via internet URL-->
</body>
</html>
